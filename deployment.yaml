apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-tasks-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brain-tasks-app
  template:
    metadata:
      labels:
        app: brain-tasks-app
    spec:
      containers:
      - name: brain-tasks-app
        image: <account-id>.dkr.ecr.<region>.amazonaws.com/brain-tasks-app:latest
        ports:
          - containerPort: 3000
        imagePullPolicy: Always
